<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/autoparts.css">
    <title>AutoParts</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="/img/logo_aplicacion.png" width="60" height="60" alt="Logo" class="mr-2">
            <span style="font-size: 28px; font-weight: bold; color: #111;">AutoPartes</span>
        </a>
        <ul class="navbar-nav ml-auto d-flex flex-row">
            <li class="nav-item mr-4">
                <a class="nav-link text-dark" href="#">
                    <i class="bi bi-house-door"></i>
                    Productos
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-dark" href="#">
                    <i class="bi bi-cart3"></i>
                    Carrito
                </a>
            </li>
        </ul>
    </nav>

    <div class="container mt-5 autoparts-destacados">
        <h1 class="font-weight-bold">Catálogo de Productos</h1>
        <p class="text-muted">
            Explora nuestra selección de auto partes de alta calidad
        </p>
        <div class="row mt-4">
            <!-- MENÚ DE CATEGORÍAS -->
            <div class="form-group">

                <label for="categoria">Categoría</label>

                <select class="form-control" 
                        th:field="*{categoria}" 
                        id="categoria">

                    <option value="">Seleccione una categoría</option>

                    <option th:each="categoria : ${categorias}"
                            th:value="${categoria.catId}"
                            th:text="${categoria.catNombre}">
                    </option>

                </select>

            </div>
            <!-- PRODUCTOS -->
            <div th:each="producto : ${productos}" class="col-md-3 mb-4">

                <div class="card border-0 shadow-sm h-100">

                    <!-- Imagen -->
                    <img th:src="${producto.prodImagenUrl}" 
                         class="card-img-top" 
                         alt="Producto">

                    <div class="card-body d-flex flex-column">

                        <!-- Nombre -->
                        <h5 th:text="${producto.prodNombre}"
                            class="card-title font-weight-bold"></h5>

                        <!-- Descripción -->
                        <p th:text="${producto.prodDescripcion}"
                           class="card-text text-muted"></p>

                        <!-- Precio -->
                        <h3 th:text="'$' + ${producto.prodPrecioVenta}"
                            class="font-weight-bold mb-3"></h3>

                        <!-- Botón -->
                        <a href="#" class="btn btn-danger mt-auto">
                            <i class="bi bi-eye-fill"></i>
                            Ver Detalles
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"></script>

</body>
</html>
