<html>
<head>
    <meta charset="UTF-8">
    <title>Registro - AutoParts</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/registro.css">
</head>

<body>

<div class="registro-container">

    <div class="registro-card">

        <div class="text-center mb-4">
            <h1 class="titulo">AutoParts</h1>
            <p class="subtitulo">Crear cuenta de cliente</p>
        </div>

        <form th:action="@{/registro}" th:object="${cliente}" method="post">

            <div class="mb-3">
                <label class="form-label">Nombre Completo</label>
                <input type="text"
                       th:field="*{cliNombre}"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email"
                       th:field="*{cliEmail}"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="text"
                       th:field="*{cliTelefono}"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Calle</label>
                <input type="text"
                       th:field="*{cliCalle}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Colonia</label>
                <input type="text"
                       th:field="*{cliColonia}"
                       class="form-control">
            </div>

            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password"
                       th:field="*{cliPassword}"
                       class="form-control"
                       required>
            </div>

            <button type="submit" class="btn btn-primary btn-registro">
                Crear Cuenta
            </button>

        </form>

        <div class="text-center mt-4">
            ¿Ya tienes cuenta?
            <a href="/login-user" class="login-link">
                Iniciar Sesión
            </a>
        </div>

    </div>

</div>

</body>
</html>
