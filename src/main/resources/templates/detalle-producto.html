<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle Producto</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">

        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <img src="/img/logo_aplicacion.png"
                 width="60"
                 height="60"
                 alt="Logo"
                 class="mr-2">

            <span style="font-size: 28px; font-weight: bold; color: #111;">
                AutoPartes
            </span>
        </a>

        <ul class="navbar-nav ml-auto d-flex flex-row">

            <li class="nav-item mr-4">
                <a class="nav-link text-dark" th:href="@{/}">
                    <i class="bi bi-house-door"></i>
                    Productos
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-dark" th:href="@{/carrito}">
                    <i class="bi bi-cart3"></i>
                    Carrito
                </a>
            </li>

        </ul>

    </nav>

    <!-- CONTENIDO -->
    <div class="container mt-5">

        <div class="card border-0 shadow-lg p-4">

            <div class="row">

                <!-- IMAGEN -->
                <div class="col-md-6 text-center">

                    <img th:src="${producto.prodImagenUrl}"
                         class="img-fluid rounded shadow"
                         style="max-height: 450px;"
                         alt="Imagen del producto">

                </div>

                <!-- DETALLES -->
                <div class="col-md-6">

                    <!-- NOMBRE -->
                    <h1 th:text="${producto.prodNombre}"
                        class="font-weight-bold mb-3">
                    </h1>

                    <hr>

                    <!-- PRECIO -->
                    <h2 class="text-danger font-weight-bold mb-4">

                        $
                        <span th:text="${producto.prodPrecioVenta}"></span>

                    </h2>

                    <!-- STOCK -->
                    <p class="text-success font-weight-bold">

                        <i class="bi bi-box-seam"></i>

                        Stock disponible:
                        <span th:text="${producto.prodStock}"></span>

                    </p>

                    <!-- CATEGORIA -->
                    <p class="mb-4">

                        <strong>Categoría:</strong>

                        <span class="badge badge-dark p-2"
                              th:text="${producto.categoria != null ? producto.categoria.catNombre : 'Sin categoría'}">
                        </span>

                    </p>

                    <!-- DESCRIPCION -->
                    <div class="mb-4">

                        <h5 class="font-weight-bold">
                            Descripción
                        </h5>

                        <p class="text-muted"
                           th:text="${producto.prodDescripcion}">
                        </p>

                    </div>

                    <!-- FORMULARIO -->
                    <form th:action="@{/carrito/agregar}"
                          method="post">

                        <!-- PRODUCTO ID -->
                        <input type="hidden"
                               name="productoId"
                               th:value="${producto.prodId}">

                        <!-- CANTIDAD -->
                        <div class="form-group">

                            <label class="font-weight-bold">
                                Cantidad
                            </label>

                            <input type="number"
                                   name="cantidad"
                                   value="1"
                                   min="1"
                                   th:max="${producto.prodStock}"
                                   class="form-control w-25">

                        </div>

                        <!-- BOTONES -->
                        <div class="d-flex">

                            <!-- AGREGAR -->
                            <button type="submit"
                                    class="btn btn-danger btn-lg mr-3">

                                <i class="bi bi-cart-plus"></i>

                                Agregar al carrito

                            </button>

                            <!-- VOLVER -->
                            <a th:href="@{/}"
                               class="btn btn-outline-secondary btn-lg">

                                <i class="bi bi-arrow-left"></i>

                                Volver

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
<footer class="bg-dark text-white mt-5 py-4">
    <div class="container">

        <div class="row">

            <!-- Información -->
            <div class="col-md-4 mb-3">
                <h5 class="font-weight-bold">AutoPartes Store</h5>
                <p class="small text-light">
                    Tu tienda confiable de autopartes y accesorios automotrices.
                </p>
            </div>

            <!-- Enlaces -->
            <div class="col-md-4 mb-3">
                <h5 class="font-weight-bold">Enlaces</h5>

                <ul class="list-unstyled">
                    <li>
                        <a th:href="@{/}" class="text-light">
                            Inicio
                        </a>
                    </li>

                    <li>
                        <a href="#" class="text-light">
                            Productos
                        </a>
                    </li>

                    <li>
                        <a href="#" class="text-light">
                            Contacto
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Redes -->
            <div class="col-md-4 mb-3">
                <h5 class="font-weight-bold">Síguenos</h5>

                <a href="#" class="text-white mr-3">
                    <i class="bi bi-facebook"></i>
                </a>

                <a href="#" class="text-white mr-3">
                    <i class="bi bi-instagram"></i>
                </a>

                <a href="#" class="text-white">
                    <i class="bi bi-whatsapp"></i>
                </a>
            </div>

        </div>

        <hr class="bg-secondary">

        <div class="text-center small">
            © 2026 AutoPartes Store | Todos los derechos reservados
        </div>

    </div>
</footer>
</body>
</html>
