<html>
<head>
    <meta charset="UTF-8">
    <title>Detalle Pedido</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/pedido-detalles.css">
</head>
<body>

<div class="container py-5">

    <div class="card pedido-card">

        <div class="card-header pedido-header">
            <h2>
                Pedido #<span th:text="${pedido.id}"></span>
            </h2>
        </div>

        <div class="card-body">

            <div class="row mb-4">

                <div class="col-md-6">
                    <h5>Información del Cliente</h5>

                    <p>
                        <strong>Cliente:</strong>
                        <span th:text="${pedido.cliente.cliNombre}"></span>
                    </p>

                    <p>
                        <strong>Estado:</strong>

                        <span th:if="${pedido.estado == 'ENTREGADO'}"
                              class="badge bg-success">
                            ENTREGADO
                        </span>

                        <span th:if="${pedido.estado == 'PENDIENTE'}"
                              class="badge bg-warning text-dark">
                            PENDIENTE
                        </span>

                    </p>
                </div>

                <div class="col-md-6">

                    <h5>Información del Pedido</h5>

                    <p>
                        <strong>Fecha Pedido:</strong>
                        <span th:text="${#temporals.format(pedido.fechaPedido,'dd/MM/yyyy')}"></span>
                    </p>

                    <p>
                        <strong>Fecha Entrega:</strong>
                        <span th:text="${#temporals.format(pedido.fechaEntrega,'dd/MM/yyyy')}"></span>
                    </p>

                    <p>
                        <strong>Método Pago:</strong>
                        <span th:text="${pedido.metodoPago}"></span>
                    </p>

                </div>

            </div>

            <hr>

            <h4 class="mb-3">Productos del Pedido</h4>

            <table class="table table-hover">

                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Precio Unitario</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="detalle : ${pedido.detalles}">

                        <td th:text="${detalle.producto.prodNombre}"></td>

                        <td th:text="${detalle.cantidad}"></td>

                        <td th:text="'$' + ${detalle.precio}"></td>

                        <td th:text="'$' + ${detalle.precio * detalle.cantidad}"></td>

                    </tr>

                </tbody>

            </table>

            <div class="text-end mt-4">
                <a href="/admin/dashboard" class="btn btn-secondary">
                    Volver
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
