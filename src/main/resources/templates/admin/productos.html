<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Panel Admin - Formulario Producto</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">

        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-dark text-white py-3">
                            <h4 class="mb-0" th:text="${producto.prodId != 0} ? 'Modificar Autoparte' : 'Nueva Autoparte'">Formulario Producto</h4>
                        </div>
                        <div class="card-body p-4">

                            <form th:action="@{/admin/productos/guardar}" th:object="${producto}" method="POST">

                                <input type="hidden" th:field="*{prodId}">

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Nombre de la pieza</label>
                                    <input type="text" class="form-control" th:field="*{prodNombre}" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Descripción</label>
                                    <textarea class="form-control" th:field="*{prodDescripcion}" rows="2"></textarea>
                                </div>

                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label fw-bold">Precio Compra ($)</label>
                                        <input type="number" step="0.01" class="form-control" th:field="*{prodPrecioCompra}" required>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label fw-bold">Precio Venta ($)</label>
                                        <input type="number" step="0.01" class="form-control" th:field="*{prodPrecioVenta}" required>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label fw-bold">Stock (`prod_stock`)</label>
                                        <input type="number" class="form-control" th:field="*{prodStock}" required>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Categoría del Sistema</label>
                                        <select th:field="*{categoria.catId}" class="form-select" required>
                                            <option value="">Seleccione una categoría...</option>
                                            <option th:each="cat : ${listaCategorias}" 
                                                    th:value="${cat.catId}" 
                                                    th:text="${cat.catNombre}">
                                                Nombre de la Categoría
                                            </option>
                                        </select>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Proveedor</label>

                                        <select th:field="*{proveedor.provId}" class="form-select" required>

                                            <option value="">Seleccione un proveedor</option>

                                            <option th:each="proveedor : ${listaProveedores}"
                                                    th:value="${proveedor.provId}"
                                                    th:text="${proveedor.provEmpresa}">
                                            </option>

                                        </select>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-bold">URL de la Imagen</label>
                                    <input type="url" class="form-control" th:field="*{prodImagenUrl}" required>
                                </div>

                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/admin/productos}" class="btn btn-outline-secondary">Cancelar</a>
                                    <button type="submit" class="btn btn-primary px-4">Guardar Producto</button>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>

    </body>
</html>
