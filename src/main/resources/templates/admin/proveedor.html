<html>
    <head>
        <meta charset="UTF-8">
        <title>Proveedor</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
              rel="stylesheet">
    </head>

    <body class="bg-light">

        <div class="container mt-5">

            <div class="card shadow">

                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">Formulario Proveedor</h4>
                </div>

                <div class="card-body">

                    <form th:action="@{/admin/proveedor/guardar}"
                          th:object="${proveedor}"
                          method="POST">

                        <input type="hidden" th:field="*{provId}">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" th:field="*{provNombre}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Empresa</label>
                            <input type="text" class="form-control" th:field="*{provEmpresa}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" class="form-control" th:field="*{provTelefono}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{provEmail}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Calle</label>
                            <input type="text" class="form-control" th:field="*{provCalle}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Código Postal</label>
                            <input type="text" class="form-control" th:field="*{provCp}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Colonia</label>
                            <input type="text" class="form-control" th:field="*{provColonia}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Estado</label>
                            <input type="text" class="form-control" th:field="*{provEstado}">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Fecha de Registro</label>
                            <input type="date"
                                   class="form-control"
                                   th:field="*{provFechaRegistro}">
                        </div>

                        <!-- opcional: si lo manejas automático en BD -->
                        <input type="hidden" th:field="*{provFechaRegistro}">

                        <div class="d-flex justify-content-end gap-2">

                            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">
                                Cancelar
                            </a>

                            <button type="submit" class="btn btn-primary">
                                Guardar Proveedor
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </body>
</html>
