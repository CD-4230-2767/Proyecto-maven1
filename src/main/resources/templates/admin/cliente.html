<html>
    <head>
        <meta charset="UTF-8">
        <title>Formulario Cliente</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class="bg-light">

        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-8">

                    <div class="card-header bg-dark text-white">
                        <h4 th:text="${cliente.cliId != null} ? 'Editar Cliente' : 'Nuevo Cliente'">
                            Formulario Cliente
                        </h4>
                    </div>

                    <div class="card-body">

                        <form th:action="@{/admin/cliente/guardar}"
                              th:object="${cliente}"
                              method="POST">

                            <input type="hidden" th:field="*{cliId}">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre</label>
                                <input type="text" class="form-control"
                                       th:field="*{cliNombre}" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Teléfono</label>
                                    <input type="text" class="form-control"
                                           th:field="*{cliTelefono}" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Email</label>
                                    <input type="email" class="form-control"
                                           th:field="*{cliEmail}" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Calle</label>
                                <input type="text" class="form-control"
                                       th:field="*{cliCalle}" required>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold">Código Postal</label>
                                    <input type="text" class="form-control"
                                           th:field="*{cliCp}">
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold">Colonia</label>
                                    <input type="text" class="form-control"
                                           th:field="*{cliColonia}">
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold">Estado</label>
                                    <input type="text" class="form-control"
                                           th:field="*{cliEstado}">
                                </div>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/admin/dashboard}" 
                                   class="btn btn-secondary">
                                    Cancelar
                                </a>

                                <button type="submit" 
                                        class="btn btn-primary">
                                    Guardar Cliente
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
