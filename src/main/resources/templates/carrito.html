<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <title>Carrito de Compras</title>
</head>

<body>

    <div class="container mt-4">

        <h2 class="font-weight-bold">Carrito de Compras</h2>

        <div th:if="${#lists.isEmpty(pedido.detalles)}" class="alert alert-info mt-4 text-center">
            <p class="mb-2">Tu carrito está vacío.</p>
            <a th:href="@{/}" class="btn btn-danger btn-sm">Ir a la tienda</a>
        </div>

        <div th:if="${!#lists.isEmpty(pedido.detalles)}" class="row mt-4">

            <div class="col-md-8">

                <div th:each="detalle : ${pedido.detalles}" class="card mb-3 shadow-sm">

                    <div class="card-body d-flex">

                        <img th:src="${detalle.producto.prodImagenUrl != null ? detalle.producto.prodImagenUrl : '/img/producto.jpg'}"
                             style="width:100px;height:100px;object-fit:cover;"
                             class="rounded" alt="Autoparte">

                        <div class="ml-3 flex-grow-1">

                            <h5 class="mb-1" th:text="${detalle.producto.prodNombre}">Nombre de la Autoparte</h5>

                            <small class="d-block text-muted text-truncate mb-2" style="max-width: 350px;" th:text="${detalle.producto.prodDescripcion}">Descripción breve</small>

                            <div class="d-flex align-items-center mt-2">
                                <a th:href="@{/carrito/restar/{id}(id=${detalle.id})}" class="btn btn-light btn-sm font-weight-bold">-</a>
                                
                                <span class="mx-3 font-weight-bold" th:text="${detalle.cantidad}">1</span>
                                
                                <a th:href="@{/carrito/sumar/{id}(id=${detalle.id})}" class="btn btn-light btn-sm font-weight-bold">+</a >
                            </div>

                        </div>

                        <div class="text-right d-flex flex-column justify-content-between" style="min-width: 110px;">
                            <div>
                                <h5 class="mb-0 font-weight-bold text-dark" 
                                    th:text="'$' + ${#numbers.formatDecimal(detalle.precio * detalle.cantidad, 1, 'COMMA', 2, 'POINT')}">$0.00</h5>

                                <small class="text-muted" 
                                       th:text="'$' + ${#numbers.formatDecimal(detalle.precio, 1, 'COMMA', 2, 'POINT')} + ' c/u'">$0.00 c/u</small>
                            </div>

                            <div class="mt-2">
                                <a th:href="@{/carrito/eliminar/{id}(id=${detalle.id})}" class="btn btn-sm btn-outline-danger border-0">
                                    <i class="bi bi-trash fs-5"></i>
                                </a>
                            </div>
                        </div>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <h5 class="font-weight-bold">Resumen del Pedido</h5>

                        <hr>

                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal</span>
                            <span th:text="'$' + ${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}">$0.00</span>
                        </div>

                        <div class="d-flex justify-content-between text-success mb-2">
                            <span>Envío</span>
                            <span class="font-weight-bold">GRATIS</span>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between font-weight-bold h5 mb-3">
                            <span>Total</span>
                            <span class="text-danger" th:text="'$' + ${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}">$0.00</span>
                        </div>

                        <form th:action="@{/carrito/pagar}" method="post">
                            <button type="submit" class="btn btn-danger btn-block btn-lg font-weight-bold shadow-sm">
                                Proceder al Pago
                            </button>
                        </form>

                        <a th:href="@{/}" class="d-block text-center mt-3 text-secondary small">
                            <i class="bi bi-arrow-left"></i> Continuar comprando
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"></script>

</body>
</html>
